font_size 10
font_family		JetBrainsMono NF Regular
bold_font		JetBrainsMono NF Bold
italic_font		JetBrainsMono NF Italic
bold_italic_font	JetBrainsMono NF Bold Italic

tab_bar_style powerline
tab_powerline_style slanted
active_tab_background	#cba6f7
active_tab_foreground	#11111b
inactive_tab_background	#11111b
inactive_tab_foreground	#cdd6f4
foreground		#cdd6f4
background		#1e1e2e

cursor none
selection_background none
selection_foreground none
background_opacity 0.5
confirm_os_window_close 0
enable_audio_bell no
open_url_with firefox -new-window

map alt+c		copy_to_clipboard
map alt+v		paste_from_clipboard
map alt+shift+enter	new_tab
map alt+q		close_tab
map alt+1		goto_tab 1
map alt+2		goto_tab 2
map alt+3		goto_tab 3
map alt+4		goto_tab 4
map alt+5		goto_tab 5
map alt+6		goto_tab 6
map alt+7		goto_tab 7
map alt+8		goto_tab 8
map alt+9		goto_tab 9
map alt+shift+k		increase_font_size
map alt+shift+j		decrease_font_size
map alt+0		restore_font_size
map alt+k		scroll_line_up
map alt+j		scroll_line_down
map alt+u		scroll_page_up
map alt+d		scroll_page_down
map alt+h		show_scrollback
